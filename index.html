    <style>
      body {

        background: url("images/mest.gif") center center fixed;
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
      }

      /* Mobil cihazlarda bozulmayı engelle */
      @media (max-width: 768px) {
        body {
          background-size: cover;
          background-position: center;
        }
      }

      /* Tablet için */
      @media (min-width: 769px) and (max-width: 1200px) {

          background-position: center;
        }
      }

      /* YENİ EKLENEN BUTON TASARIMI */
      .disabled-button {
        margin-top: 15px;
        width: 260px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        text-align: center;
        color: white;
        font-size: 18px;
        font-weight: bold;
        backdrop-filter: blur(4px);
        cursor: default;
        user-select: none;
      }
      #loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 99999;
  overflow: hidden;
  background: black;
  transition: opacity 2s ease;
}

#loader img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.loader-hide {
  opacity: 0;
  pointer-events: none;
}

.loader-text {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 32px;
  font-weight: bold;
}

.loader-subtext {
  position: absolute;
  bottom: 45px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
}

.loader-bar {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 6px;
  background: rgba(255,255,255,.2);
  overflow: hidden;
}

.loader-bar::after {
  content: "";
  display: block;
  height: 100%;
  width: 0%;
  background: white;
  animation: loading 5s linear forwards;
}

@keyframes loading {
  from { width: 0%; }
  to { width: 100%; }
}
    </style>
